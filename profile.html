<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>User Profile</title>
<link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/static/logo.svg" />
<style>
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --muted: #94a3b8;
  --fg: #f1f5f9;
  --accent: #00c6ff;
  --accent-2: #0072ff;
  --lining: #334155;
  --shadow: 0 0 12px rgba(0,114,255,.35);
}
:root[data-theme='light']{
  --bg:#2a004f;
  --panel:rgba(42,0,79,0.4);
  --fg:#ffd700;
  --muted:#c0a000;
  --accent:#ffd700;
  --accent-2:#ffd700;
  --lining:#ffd700;
  --shadow:0 0 20px rgba(255,215,0,.4);
}
body{margin:0;padding:20px;background:var(--bg);color:var(--fg);font:15px/1.45 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
.profile-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:color-mix(in oklab, var(--panel), transparent 25%);padding:10px;border-radius:12px;border:1px solid var(--lining);box-shadow:var(--shadow);backdrop-filter:blur(8px);}
.profile-header img{width:64px;height:64px;border-radius:50%;object-fit:cover;}
.follow-btn{padding:8px 12px;border-radius:12px;border:0;font-weight:700;cursor:pointer;background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#05130e;box-shadow:var(--shadow);}
.posts{list-style:none;padding:0;margin:0;}
.post{margin-bottom:12px;padding:10px;border:1px solid var(--lining);border-radius:12px;background:color-mix(in oklab, var(--panel), transparent 25%);box-shadow:var(--shadow);backdrop-filter:blur(8px);}
.post-media{margin-top:8px;max-width:100%;border-radius:8px;}
.post-meta{color:var(--muted);font-size:13px;margin-bottom:6px;}
.tab-row{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}
.tab-btn{padding:6px 10px;border-radius:999px;border:1px solid var(--lining);background:transparent;color:var(--fg);cursor:pointer;}
.tab-btn.active{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#05130e;font-weight:700;}
textarea,.reply-input{width:100%;min-height:80px;border-radius:8px;border:1px solid var(--lining);background:color-mix(in oklab, var(--panel), transparent 25%);color:var(--fg);padding:8px;box-shadow:var(--shadow);backdrop-filter:blur(8px);}
.reply-wrap{margin-top:10px;}
.reply-list{margin-top:8px;padding-top:8px;border-top:1px solid var(--lining);}
.reply-item{font-size:13px;margin:4px 0;}
.hidden{display:none!important;}
.section-title{margin:10px 0 8px;}
</style>
</head>
<body>
<button id="back-btn" class="follow-btn" type="button" style="margin-bottom:12px">Back</button>
<div class="profile">
  <div class="profile-header">
    <img id="p-avatar" alt="avatar" />
    <h2 id="p-name"></h2>
    <button id="follow-btn" class="follow-btn"></button>
    <button id="message-btn" class="follow-btn" hidden>Message</button>
  </div>
  <div id="edit-section" hidden>
    <input type="file" id="p-pic" accept="image/*" />
    <textarea id="p-desc-input" placeholder="Add a description..."></textarea>
    <button id="save-desc" class="follow-btn" type="button">Save</button>
  </div>
  <p id="p-desc"></p>
  <div id="follow-info" style="margin:8px 0;color:var(--muted);"></div>

  <div class="tab-row" id="feed-tabs">
    <button class="tab-btn active" data-tab="posts" type="button">Posts</button>
    <button class="tab-btn" data-tab="replies" type="button">Replies</button>
    <button class="tab-btn" data-tab="images" type="button">Images</button>
    <button class="tab-btn" data-tab="videos" type="button">Videos</button>
  </div>

  <h3 class="section-title">Profile Feed</h3>
  <ul id="p-feed" class="posts"></ul>

  <div id="settings-section" hidden>
    <h3>Notification Settings</h3>
    <label><input type="checkbox" id="push-toggle" /> Enable push notifications</label><br />
    <label><input type="checkbox" id="live-toggle" /> Notify when followed users go live</label>
  </div>
  <h3>Notifications</h3>
  <ul id="p-notifs" class="posts"></ul>
</div>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const user = params.get('user');
  const storeUser = localStorage.getItem('chaines_username') || '';
  const avatar = document.getElementById('p-avatar');
  const nameEl = document.getElementById('p-name');
  const descEl = document.getElementById('p-desc');
  const feedEl = document.getElementById('p-feed');
  const followBtn = document.getElementById('follow-btn');
  const editSection = document.getElementById('edit-section');
  const descInput = document.getElementById('p-desc-input');
  const picInput = document.getElementById('p-pic');
  const saveDesc = document.getElementById('save-desc');
  const followInfo = document.getElementById('follow-info');
  const notifsEl = document.getElementById('p-notifs');
  const backBtn = document.getElementById('back-btn');
  const settingsSection = document.getElementById('settings-section');
  const pushToggle = document.getElementById('push-toggle');
  const liveToggle = document.getElementById('live-toggle');
  const messageBtn = document.getElementById('message-btn');
  const tabs = [...document.querySelectorAll('#feed-tabs .tab-btn')];
  const feedMemoryKey = user ? ('chaines_profile_feed_' + user) : '';
  const tabMemoryKey = user ? ('chaines_profile_feed_tab_' + user) : '';
  const allowedTabs = new Set(['posts', 'replies', 'images', 'videos']);

  function defaultWS(){
    const saved = localStorage.getItem('chaines_ws_url');
    if(saved) return saved;
    const host = (location.hostname && !/localhost|127\.0\.0\.1/.test(location.hostname))
      ? 'chaines-io-chat.onrender.com'
      : location.host;
    const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
    return proto + host + '/ws';
  }

  function apiBaseURL(){
    try{
      const u = new URL(defaultWS(), location.href);
      u.protocol = u.protocol === 'wss:' ? 'https:' : 'http:';
      u.pathname = '';
      u.search = '';
      u.hash = '';
      return u.origin;
    }catch{
      return location.origin;
    }
  }

  function apiURL(path){
    if(/^https?:\/\//i.test(path || '')) return path;
    return apiBaseURL() + path;
  }

  function apiFetch(path, options){
    return fetch(apiURL(path), options);
  }

  let profileData = null;
  const rememberedTab = tabMemoryKey ? (localStorage.getItem(tabMemoryKey) || '') : '';
  let activeTab = allowedTabs.has(rememberedTab) ? rememberedTab : 'posts';

  backBtn.onclick = () => { window.location.href = '/'; };

  picInput.addEventListener('change', () => {
    if (picInput.files[0]) {
      const file = picInput.files[0];
      avatar.src = URL.createObjectURL(file);
      const reader = new FileReader();
      reader.onload = (e) => {
        localStorage.setItem('chaines_profile_pic', e.target.result);
      };
      reader.readAsDataURL(file);
    }
  });

  tabs.forEach((btn) => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      if(tabMemoryKey) localStorage.setItem(tabMemoryKey, activeTab);
      tabs.forEach((item) => item.classList.toggle('active', item === btn));
      renderFeed();
    });
  });
  tabs.forEach((item) => item.classList.toggle('active', item.dataset.tab === activeTab));

  function normalizeProfileData(raw){
    const data = raw && typeof raw === 'object' ? raw : {};
    return {
      ...data,
      posts: Array.isArray(data.posts) ? data.posts : [],
      replies: Array.isArray(data.replies) ? data.replies : []
    };
  }

  function saveFeedMemory(){
    if(!feedMemoryKey || !profileData) return;
    try {
      localStorage.setItem(feedMemoryKey, JSON.stringify({
        username: profileData.username || user,
        profilePic: profileData.profilePic || null,
        description: profileData.description || '',
        posts: Array.isArray(profileData.posts) ? profileData.posts : [],
        replies: Array.isArray(profileData.replies) ? profileData.replies : [],
        followerCount: Number.isFinite(profileData.followerCount) ? profileData.followerCount : (profileData.followers?.length || 0),
        followingCount: Number.isFinite(profileData.followingCount) ? profileData.followingCount : (profileData.following?.length || 0),
        savedAt: Date.now()
      }));
    } catch {}
  }

  function loadFeedMemory(){
    if(!feedMemoryKey) return null;
    try {
      return normalizeProfileData(JSON.parse(localStorage.getItem(feedMemoryKey) || 'null'));
    } catch {
      return null;
    }
  }

  function formatTime(ts){
    if(!ts) return 'Unknown time';
    const d = new Date(ts);
    return Number.isNaN(d.getTime()) ? 'Unknown time' : d.toLocaleString();
  }

  function detectMime(post){
    if(post.file_type) return post.file_type;
    if(post.fileType) return post.fileType;
    if(post.file){
      const m = String(post.file).match(/^data:(.*?);/);
      if(m) return m[1];
    }
    if(post.image) return 'image/*';
    return '';
  }

  function filteredFeed(){
    const posts = Array.isArray(profileData?.posts) ? profileData.posts : [];
    const replies = Array.isArray(profileData?.replies) ? profileData.replies : [];
    if(activeTab === 'replies') return replies;
    if(activeTab === 'images') return posts.filter((p) => detectMime(p).startsWith('image/'));
    if(activeTab === 'videos') return posts.filter((p) => detectMime(p).startsWith('video/'));
    return posts;
  }

  function createReplyElement(c){
    const div = document.createElement('div');
    div.className = 'reply-item';
    div.textContent = '@' + (c.user || 'unknown') + ': ' + (c.text || '');
    return div;
  }

  function renderPostCard(post){
    const li = document.createElement('li');
    li.className = 'post';
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = 'Post #' + post.id + ' • ' + formatTime(post.ts);
    li.appendChild(meta);

    const text = document.createElement('div');
    text.textContent = post.message || post.text || '';
    li.appendChild(text);

    const data = post.file || post.image;
    const mime = detectMime(post);
    if(data && mime.startsWith('image/')){
      const img = document.createElement('img');
      img.className = 'post-media';
      img.src = data;
      img.alt = post.file_name || post.fileName || 'image';
      li.appendChild(img);
    } else if(data && mime.startsWith('video/')){
      const vid = document.createElement('video');
      vid.className = 'post-media';
      vid.src = data;
      vid.controls = true;
      vid.playsInline = true;
      li.appendChild(vid);
    }

    const actions = document.createElement('div');
    actions.className = 'reply-wrap';
    const likeBtn = document.createElement('button');
    likeBtn.className = 'follow-btn';
    likeBtn.type = 'button';
    likeBtn.textContent = '❤️ ' + (post.likes || 0);
    likeBtn.addEventListener('click', async () => {
      if(!storeUser){ alert('Log in to like posts.'); return; }
      const res = await apiFetch('/messages/' + encodeURIComponent(post.id) + '/like', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ user: storeUser })
      });
      const data = await res.json().catch(()=>({}));
      if(res.ok){
        post.likes = data.likes || post.likes || 0;
        likeBtn.textContent = '❤️ ' + post.likes;
        saveFeedMemory();
      }
    });
    actions.appendChild(likeBtn);

    const replyList = document.createElement('div');
    replyList.className = 'reply-list';
    (post.comments || []).forEach((reply) => replyList.appendChild(createReplyElement(reply)));

    const form = document.createElement('form');
    form.className = 'reply-wrap';
    const input = document.createElement('input');
    input.className = 'reply-input';
    input.placeholder = 'Reply to this post...';
    form.appendChild(input);
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      if(!storeUser){ alert('Log in to reply.'); return; }
      const textValue = (input.value || '').trim();
      if(!textValue) return;
      const res = await apiFetch('/messages/' + encodeURIComponent(post.id) + '/reply', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ user: storeUser, text: textValue })
      });
      const data = await res.json().catch(()=>({}));
      if(res.ok && data.reply){
        post.comments = post.comments || [];
        post.comments.push({ id: data.reply.id, user: storeUser, text: textValue, ts: data.reply.ts });
        replyList.appendChild(createReplyElement({ user: storeUser, text: textValue }));
        if(Array.isArray(profileData?.replies)){
          profileData.replies.unshift({
            id: data.reply.id,
            message_id: post.id,
            user: storeUser,
            text: textValue,
            ts: data.reply.ts,
            post_user: profileData?.username || user
          });
        }
        saveFeedMemory();
        input.value = '';
      }
    });

    li.appendChild(actions);
    li.appendChild(replyList);
    li.appendChild(form);
    return li;
  }

  function renderReplyCard(reply){
    const li = document.createElement('li');
    li.className = 'post';
    li.innerHTML = `<div class="post-meta">Reply • ${formatTime(reply.ts)}</div><div>${reply.text || ''}</div><div class="post-meta">On @${reply.post_user || 'unknown'} post #${reply.message_id || ''}</div>`;
    return li;
  }

  function renderFeed(){
    feedEl.innerHTML = '';
    const items = filteredFeed();
    if(!items.length){
      const li = document.createElement('li');
      li.className = 'post';
      li.textContent = 'No ' + activeTab + ' yet.';
      feedEl.appendChild(li);
      return;
    }
    if(activeTab === 'replies'){
      items.forEach((reply) => feedEl.appendChild(renderReplyCard(reply)));
      return;
    }
    items.forEach((post) => feedEl.appendChild(renderPostCard(post)));
  }

  pushToggle.addEventListener('change', async () => {
    if (pushToggle.checked) {
      try {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { pushToggle.checked = false; return; }
        const reg = await navigator.serviceWorker.register('/sw.js');
        const res = await apiFetch('/push/key');
        const data = await res.json().catch(()=>({}));
        if (!data.key) { pushToggle.checked = false; return; }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(data.key)
        });
        await apiFetch('/push/subscribe', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ username: storeUser, subscription: sub })
        });
        await apiFetch('/notification-settings/' + encodeURIComponent(storeUser), {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ push: true })
        });
      } catch {
        pushToggle.checked = false;
      }
    } else {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg) {
        const sub = await reg.pushManager.getSubscription();
        if (sub) await sub.unsubscribe();
      }
      await apiFetch('/push/unsubscribe', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: storeUser })
      });
      await apiFetch('/notification-settings/' + encodeURIComponent(storeUser), {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ push: false })
      });
    }
  });

  liveToggle.addEventListener('change', async () => {
    await apiFetch('/notification-settings/' + encodeURIComponent(storeUser), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ live: liveToggle.checked })
    });
  });

  async function load(){
    if(!user) return;
    if(!profileData){
      const cached = loadFeedMemory();
      if(cached){
        profileData = cached;
        renderFeed();
      }
    }
    const res = await apiFetch('/profile/' + encodeURIComponent(user) + '?viewer=' + encodeURIComponent(storeUser));
    if(!res.ok) return;
    const data = normalizeProfileData(await res.json());
    profileData = data;
    saveFeedMemory();
    nameEl.textContent = '@' + data.username;
    if(data.profilePic){ avatar.src = data.profilePic; avatar.style.display='block'; } else { avatar.style.display='none'; }
    descEl.textContent = data.description || '';
    const followerCount = Number.isFinite(data.followerCount) ? data.followerCount : (data.followers?.length || 0);
    const followingCount = Number.isFinite(data.followingCount) ? data.followingCount : (data.following?.length || 0);
    followInfo.textContent = 'Followers: ' + followerCount + ' • Following: ' + followingCount;

    if(storeUser && storeUser !== user){
      followBtn.style.display = '';
      followBtn.textContent = data.isFollowing ? 'Unfollow' : 'Follow';
      messageBtn.textContent = 'Message';
      followBtn.onclick = async () => {
        const res = await apiFetch('/profile/' + encodeURIComponent(user) + '/follow', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ follower: storeUser })
        });
        if(!res.ok){
          const err = await res.json().catch(() => ({}));
          alert(err.error || 'Unable to update follow status.');
          return;
        }
        load();
      };
      messageBtn.hidden = false;
      messageBtn.onclick = () => {
        window.location.href = '/private-chat.html?user=' + encodeURIComponent(user);
      };
    } else if(!storeUser && user){
      followBtn.style.display = '';
      followBtn.textContent = 'Log in to Follow';
      followBtn.onclick = () => alert('Please log in to follow users.');
      messageBtn.hidden = false;
      messageBtn.textContent = 'Log in to Chat';
      messageBtn.onclick = () => alert('Please log in to send encrypted private messages.');
    } else {
      followBtn.style.display = 'none';
      messageBtn.hidden = true;
      editSection.hidden = false;
      descInput.value = data.description || '';
      saveDesc.onclick = async () => {
        const form = new FormData();
        form.append('description', descInput.value);
        if (picInput.files[0]) form.append('profile', picInput.files[0]);
        await apiFetch('/profile/' + encodeURIComponent(storeUser), {
          method:'POST',
          body: form
        });
        if (picInput.files[0]) {
          const reader = new FileReader();
          reader.onload = (e) => {
            localStorage.setItem('chaines_profile_pic', e.target.result);
            avatar.src = e.target.result;
            load();
            loadNotifs();
          };
          reader.readAsDataURL(picInput.files[0]);
        } else {
          load();
          loadNotifs();
        }
      };
      settingsSection.hidden = false;
      loadSettings();
      loadNotifs();
    }
    renderFeed();
  }

  async function loadNotifs(){
    const res = await apiFetch('/notifications/' + encodeURIComponent(storeUser));
    if(!res.ok) return;
    const data = await res.json();
    notifsEl.innerHTML = '';
    data.forEach(n => {
      const li = document.createElement('li');
      li.className = 'post';
      if(n.type === 'like'){
        li.textContent = (n.data.from || 'Someone') + ' liked your post #' + n.data.messageId;
      } else if(n.type === 'follow'){
        li.textContent = (n.data.from || 'Someone') + ' started following you';
      } else if(n.type === 'broadcast'){
        li.textContent = (n.data.from || 'Someone') + ' requested to ' + (n.data.mode === 'mic' ? 'join via mic' : 'join your broadcast');
      } else if(n.type === 'dm'){
        const sender = n.data.from || 'Someone';
        li.textContent = sender + ' sent you a private encrypted message';
        li.style.cursor = 'pointer';
        li.onclick = () => {
          window.location.href = '/private-chat.html?user=' + encodeURIComponent(sender);
        };
      } else if(n.type === 'self-destruct'){
        li.textContent = 'Your post #' + n.data.messageId + ' self-destructed';
      }
      notifsEl.appendChild(li);
    });
  }

  async function loadSettings(){
    const res = await apiFetch('/notification-settings/' + encodeURIComponent(storeUser));
    if(!res.ok) return;
    const data = await res.json().catch(()=>({}));
    pushToggle.checked = !!data.push;
    liveToggle.checked = !!data.live;
  }

  function urlBase64ToUint8Array(base64String){
    const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
      outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
  }

  load();
})();
</script>
</body>
</html>
