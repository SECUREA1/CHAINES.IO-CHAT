<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>User Profile</title>
<link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/static/logo.svg" />
<style>
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --muted: #94a3b8;
  --fg: #f1f5f9;
  --accent: #00c6ff;
  --accent-2: #0072ff;
  --lining: #334155;
  --shadow: 0 0 12px rgba(0,114,255,.35);
}
:root[data-theme='light']{
  --bg:#2a004f;
  --panel:rgba(42,0,79,0.4);
  --fg:#ffd700;
  --muted:#c0a000;
  --accent:#ffd700;
  --accent-2:#ffd700;
  --lining:#ffd700;
  --shadow:0 0 20px rgba(255,215,0,.4);
}
body{margin:0;padding:20px;background:var(--bg);color:var(--fg);font:15px/1.45 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
.profile-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:color-mix(in oklab, var(--panel), transparent 25%);padding:10px;border-radius:12px;border:1px solid var(--lining);box-shadow:var(--shadow);backdrop-filter:blur(8px);}
.profile-header img{width:64px;height:64px;border-radius:50%;object-fit:cover;}
.follow-btn{padding:8px 12px;border-radius:12px;border:0;font-weight:700;cursor:pointer;background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#05130e;box-shadow:var(--shadow);}
.posts{list-style:none;padding:0;margin:0;}
.post{margin-bottom:12px;padding:10px;border:1px solid var(--lining);border-radius:12px;background:color-mix(in oklab, var(--panel), transparent 25%);box-shadow:var(--shadow);backdrop-filter:blur(8px);}
.post-media{margin-top:8px;max-width:100%;border-radius:8px;}
.post-meta{color:var(--muted);font-size:13px;margin-bottom:6px;}
.tab-row{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}
.tab-btn{padding:6px 10px;border-radius:999px;border:1px solid var(--lining);background:transparent;color:var(--fg);cursor:pointer;}
.tab-btn.active{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#05130e;font-weight:700;}
textarea,.reply-input{width:100%;min-height:80px;border-radius:8px;border:1px solid var(--lining);background:color-mix(in oklab, var(--panel), transparent 25%);color:var(--fg);padding:8px;box-shadow:var(--shadow);backdrop-filter:blur(8px);}
.reply-wrap{margin-top:10px;}
.reply-list{margin-top:8px;padding-top:8px;border-top:1px solid var(--lining);}
.reply-item{font-size:13px;margin:4px 0;}
.hidden{display:none!important;}
.section-title{margin:10px 0 8px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:10px 0;}
.stat-card{padding:10px;border:1px solid var(--lining);border-radius:12px;background:color-mix(in oklab, var(--panel), transparent 25%);box-shadow:var(--shadow);backdrop-filter:blur(8px);}
.stat-label{font-size:12px;color:var(--muted);}
.stat-value{font-size:18px;font-weight:700;}
.relation-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.relation-list{list-style:none;margin:0;padding:0;}
.relation-item{padding:6px 8px;border:1px solid var(--lining);border-radius:10px;margin-bottom:6px;background:color-mix(in oklab, var(--panel), transparent 25%);}
.dating-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.verified-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:3px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  background:#14532d;
  color:#bbf7d0;
  border:1px solid #22c55e;
}
.verified-badge__dot{color:#22c55e;font-size:10px;}
.verified-badge__icon{
  width:16px;
  height:16px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 0 8px rgba(34,197,94,0.22);
}
.verified-badge__wallet-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:16px;
  height:16px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.34);
  text-decoration:none;
  background:rgba(2,6,23,0.4);
}
.verified-badge__wallet-link img{
  width:12px;
  height:12px;
}
.entry-validation{
  width:100%;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--muted);
}
.entry-validation__label{
  font-weight:700;
  color:var(--fg);
}
.entry-validation__contract{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid var(--lining);
  border-radius:999px;
  padding:4px 8px;
}
</style>
</head>
<body>
<button id="back-btn" class="follow-btn" type="button" style="margin-bottom:12px">Back</button>
<div class="profile">
  <div class="profile-header">
    <img id="p-avatar" alt="avatar" />
    <h2 id="p-name"></h2>
    <span id="p-verified" class="verified-badge" hidden>Validated</span>
    <div id="p-entry-validation" class="entry-validation" hidden></div>
    <button id="follow-btn" class="follow-btn"></button>
    <button id="message-btn" class="follow-btn" hidden>Message</button>
  </div>
  <div id="edit-section" hidden>
    <input type="file" id="p-pic" accept="image/*" />
    <textarea id="p-desc-input" placeholder="Add a description..."></textarea>
    <button id="save-desc" class="follow-btn" type="button">Save</button>
  </div>
  <p id="p-desc"></p>
  <div id="follow-info" style="margin:8px 0;color:var(--muted);"></div>
  <div id="stats-grid" class="stats-grid"></div>
  <div class="relation-grid">
    <div>
      <h3 class="section-title">Followers</h3>
      <ul id="followers-list" class="relation-list"></ul>
    </div>
    <div>
      <h3 class="section-title">Following</h3>
      <ul id="following-list" class="relation-list"></ul>
    </div>
  </div>
  <div class="dating-grid">
    <div>
      <h3 class="section-title">Dating Likes</h3>
      <ul id="dating-liked-list" class="relation-list"></ul>
    </div>
    <div>
      <h3 class="section-title">Dating Matches</h3>
      <ul id="dating-matched-list" class="relation-list"></ul>
    </div>
  </div>

  <div class="tab-row" id="feed-tabs">
    <button class="tab-btn active" data-tab="posts" type="button">Posts</button>
    <button class="tab-btn" data-tab="replies" type="button">Replies</button>
    <button class="tab-btn" data-tab="images" type="button">Images</button>
    <button class="tab-btn" data-tab="videos" type="button">Videos</button>
  </div>

  <h3 class="section-title">Profile Feed</h3>
  <ul id="p-feed" class="posts"></ul>

  <div id="settings-section" hidden>
    <h3>Notification Settings</h3>
    <label><input type="checkbox" id="push-toggle" /> Enable push notifications</label><br />
    <label><input type="checkbox" id="live-toggle" /> Notify when followed users go live</label>
  </div>
  <h3>Notifications</h3>
  <ul id="p-notifs" class="posts"></ul>
</div>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const storeUser = localStorage.getItem('chaines_username') || '';
  const fallbackUser = (params.get('user') || storeUser || '').trim();
  let currentUser = fallbackUser;
  const avatar = document.getElementById('p-avatar');
  const nameEl = document.getElementById('p-name');
  const verifiedEl = document.getElementById('p-verified');
  const entryValidationEl = document.getElementById('p-entry-validation');
  const descEl = document.getElementById('p-desc');
  const feedEl = document.getElementById('p-feed');
  const followBtn = document.getElementById('follow-btn');
  const editSection = document.getElementById('edit-section');
  const descInput = document.getElementById('p-desc-input');
  const picInput = document.getElementById('p-pic');
  const saveDesc = document.getElementById('save-desc');
  const followInfo = document.getElementById('follow-info');
  const notifsEl = document.getElementById('p-notifs');
  const followersList = document.getElementById('followers-list');
  const followingList = document.getElementById('following-list');
  const statsGrid = document.getElementById('stats-grid');
  const datingLikedList = document.getElementById('dating-liked-list');
  const datingMatchedList = document.getElementById('dating-matched-list');
  const backBtn = document.getElementById('back-btn');
  const settingsSection = document.getElementById('settings-section');
  const pushToggle = document.getElementById('push-toggle');
  const liveToggle = document.getElementById('live-toggle');
  const messageBtn = document.getElementById('message-btn');
  const tabs = [...document.querySelectorAll('#feed-tabs .tab-btn')];

  let profileData = null;
  let activeTab = 'posts';
  const TOKEN_CURRENCY_META = {
    cardano: { currency: 'ADA', label: 'Cardano' },
    ethereum: { currency: 'ETH', label: 'Ethereum' },
    polygon: { currency: 'MATIC', label: 'Polygon' },
    solana: { currency: 'SOL', label: 'Solana' }
  };

  function verifiedUsers(){
    try{
      const parsed = JSON.parse(localStorage.getItem('chaines_verified_users') || '{}');
      return parsed && typeof parsed === 'object' ? parsed : {};
    }catch{
      return {};
    }
  }

  function hashTokenSeed(seed){
    let h = 2166136261;
    const text = String(seed || 'chaines-token');
    for(let i = 0; i < text.length; i += 1){
      h ^= text.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function tokenSeedForRecord(record, fallbackUser = ''){
    if(!record || record.verified === false) return '';
    const chain = String(record.chain || '').toLowerCase();
    const currency = String(record.currency || '').toUpperCase();
    const contract = String(record.contract || '').toLowerCase();
    const badge = String(record.badge || 'validated').toLowerCase();
    const fallback = String(fallbackUser || '').toLowerCase();
    return [chain, currency, contract, badge, fallback].filter(Boolean).join('|');
  }

  function tokenBadgeSvgDataUrl(tokenSeed){
    const seed = tokenSeed || 'chaines-validated';
    const h1 = hashTokenSeed(seed);
    const h2 = hashTokenSeed(`${seed}::alt`);
    const hueA = h1 % 360;
    const hueB = h2 % 360;
    const ring = 24 + (h1 % 26);
    const core = 8 + (h2 % 10);
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='hsl(${hueA} 88% 62%)'/><stop offset='100%' stop-color='hsl(${hueB} 88% 52%)'/></linearGradient></defs><rect width='64' height='64' rx='16' fill='#051225'/><g transform='translate(32 32)'><circle r='${ring}' fill='none' stroke='url(#g)' stroke-width='6' stroke-dasharray='10 6'/><circle r='${core}' fill='url(#g)'/><circle r='${Math.max(core - 4, 2)}' fill='#dbeafe' opacity='.94'/><text x='11' y='-10' font-size='10'>✅</text></g></svg>`;
    return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
  }

  function walletBagSvgDataUrl(){
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='6' fill='#020617'/><text x='12' y='16' text-anchor='middle' font-size='12'>👜</text></svg>`;
    return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
  }

  function contractDisplayLabel(chain, contract){
    const names = {
      cardano: 'Cardano policy',
      ethereum: 'Ethereum contract',
      polygon: 'Polygon contract',
      solana: 'Solana contract'
    };
    const normalized = String(chain || 'cardano').toLowerCase();
    if(!contract) return `${names[normalized] || 'Contract'} not set`;
    return `${names[normalized] || 'Contract'} ${contract.slice(0, 6)}…${contract.slice(-4)}`;
  }

  function explorerLinkForRecord(record){
    if(!record) return '';
    const chain = String(record.chain || '').toLowerCase();
    const walletAddress = String(record.walletAddress || '').trim();
    const contract = String(record.contract || '').trim();
    const target = walletAddress || contract;
    if(!target) return '';
    if(chain === 'ethereum') return `https://etherscan.io/address/${target}`;
    if(chain === 'polygon') return `https://polygonscan.com/address/${target}`;
    if(chain === 'cardano') return target.startsWith('addr') ? `https://cardanoscan.io/address/${target}` : `https://cardanoscan.io/tokenPolicy/${target}`;
    return '';
  }

  function decorateVerifiedBadge(target, username){
    if(!target) return;
    const record = verifiedUsers()[username];
    target.textContent = '';
    const seed = tokenSeedForRecord(record, username);
    if(seed){
      const icon = document.createElement('img');
      icon.className = 'verified-badge__icon';
      icon.alt = '';
      icon.setAttribute('aria-hidden', 'true');
      icon.src = tokenBadgeSvgDataUrl(seed);
      target.appendChild(icon);
      const walletLink = explorerLinkForRecord(record);
      if(walletLink){
        const anchor = document.createElement('a');
        anchor.className = 'verified-badge__wallet-link';
        anchor.href = walletLink;
        anchor.target = '_blank';
        anchor.rel = 'noopener noreferrer';
        const bag = document.createElement('img');
        bag.src = walletBagSvgDataUrl();
        bag.alt = '';
        bag.setAttribute('aria-hidden', 'true');
        anchor.appendChild(bag);
        target.appendChild(anchor);
      }
    } else {
      const dot = document.createElement('span');
      dot.className = 'verified-badge__dot';
      dot.textContent = '●';
      dot.setAttribute('aria-hidden', 'true');
      target.appendChild(dot);
    }
    const text = document.createElement('span');
    text.textContent = record?.badge || 'Validated';
    target.appendChild(text);
  }

  function renderEntryValidation(username){
    if(!entryValidationEl) return;
    const record = verifiedUsers()[username];
    if(!record || record.verified === false){
      entryValidationEl.hidden = true;
      entryValidationEl.textContent = '';
      return;
    }
    const chain = String(record.chain || 'cardano').toLowerCase();
    const currency = String(record.currency || TOKEN_CURRENCY_META[chain]?.currency || 'ADA');
    const contract = String(record.contract || '');
    const seed = tokenSeedForRecord(record, username) || `${chain}:${contract}:profile-entry`;
    const walletLink = explorerLinkForRecord(record);
    entryValidationEl.hidden = false;
    entryValidationEl.textContent = '';

    const label = document.createElement('span');
    label.className = 'entry-validation__label';
    label.textContent = 'Entry validation';

    const chip = document.createElement('span');
    chip.className = 'entry-validation__contract';
    const icon = document.createElement('img');
    icon.src = tokenBadgeSvgDataUrl(seed);
    icon.alt = '';
    icon.setAttribute('aria-hidden', 'true');
    icon.style.width = '16px';
    icon.style.height = '16px';
    icon.style.borderRadius = '6px';
    const text = document.createElement('span');
    text.textContent = `${contractDisplayLabel(chain, contract)} • ${currency}`;
    chip.append(icon, text);

    entryValidationEl.append(label, chip);
    if(walletLink){
      const anchor = document.createElement('a');
      anchor.href = walletLink;
      anchor.target = '_blank';
      anchor.rel = 'noopener noreferrer';
      anchor.className = 'verified-badge__wallet-link';
      const bag = document.createElement('img');
      bag.src = walletBagSvgDataUrl();
      bag.alt = '';
      bag.setAttribute('aria-hidden', 'true');
      anchor.appendChild(bag);
      entryValidationEl.appendChild(anchor);
    }
  }

  backBtn.onclick = () => { window.location.href = '/'; };

  picInput.addEventListener('change', () => {
    if (picInput.files[0]) {
      const file = picInput.files[0];
      avatar.src = URL.createObjectURL(file);
      const reader = new FileReader();
      reader.onload = (e) => {
        localStorage.setItem('chaines_profile_pic', e.target.result);
      };
      reader.readAsDataURL(file);
    }
  });

  tabs.forEach((btn) => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      tabs.forEach((item) => item.classList.toggle('active', item === btn));
      renderFeed();
    });
  });

  function formatTime(ts){
    if(!ts) return 'Unknown time';
    const d = new Date(ts);
    return Number.isNaN(d.getTime()) ? 'Unknown time' : d.toLocaleString();
  }

  function detectMime(post){
    if(post.file_type) return post.file_type;
    if(post.fileType) return post.fileType;
    if(post.file){
      const m = String(post.file).match(/^data:(.*?);/);
      if(m) return m[1];
    }
    if(post.image) return 'image/*';
    return '';
  }

  function filteredFeed(){
    const posts = Array.isArray(profileData?.posts) ? profileData.posts : [];
    const replies = Array.isArray(profileData?.replies) ? profileData.replies : [];
    if(activeTab === 'replies') return replies;
    if(activeTab === 'images') return posts.filter((p) => detectMime(p).startsWith('image/'));
    if(activeTab === 'videos') return posts.filter((p) => detectMime(p).startsWith('video/'));
    return posts;
  }

  function createReplyElement(c){
    const div = document.createElement('div');
    div.className = 'reply-item';
    div.textContent = '@' + (c.user || 'unknown') + ': ' + (c.text || '');
    return div;
  }

  function renderPostCard(post){
    const li = document.createElement('li');
    li.className = 'post';
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = 'Post #' + post.id + ' • ' + formatTime(post.ts);
    li.appendChild(meta);

    const text = document.createElement('div');
    text.textContent = post.message || post.text || '';
    li.appendChild(text);

    const data = post.file || post.image;
    const mime = detectMime(post);
    if(data && mime.startsWith('image/')){
      const img = document.createElement('img');
      img.className = 'post-media';
      img.src = data;
      img.alt = post.file_name || post.fileName || 'image';
      li.appendChild(img);
    } else if(data && mime.startsWith('video/')){
      const vid = document.createElement('video');
      vid.className = 'post-media';
      vid.src = data;
      vid.controls = true;
      vid.playsInline = true;
      li.appendChild(vid);
    }

    const actions = document.createElement('div');
    actions.className = 'reply-wrap';
    const likeBtn = document.createElement('button');
    likeBtn.className = 'follow-btn';
    likeBtn.type = 'button';
    likeBtn.textContent = '❤️ ' + (post.likes || 0);
    likeBtn.addEventListener('click', async () => {
      if(!storeUser){ alert('Log in to like posts.'); return; }
      const res = await fetch('/messages/' + encodeURIComponent(post.id) + '/like', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ user: storeUser })
      });
      const data = await res.json().catch(()=>({}));
      if(res.ok){
        post.likes = data.likes || post.likes || 0;
        likeBtn.textContent = '❤️ ' + post.likes;
      }
    });
    actions.appendChild(likeBtn);

    const replyList = document.createElement('div');
    replyList.className = 'reply-list';
    (post.comments || []).forEach((reply) => replyList.appendChild(createReplyElement(reply)));

    const form = document.createElement('form');
    form.className = 'reply-wrap';
    const input = document.createElement('input');
    input.className = 'reply-input';
    input.placeholder = 'Reply to this post...';
    form.appendChild(input);
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      if(!storeUser){ alert('Log in to reply.'); return; }
      const textValue = (input.value || '').trim();
      if(!textValue) return;
      const res = await fetch('/messages/' + encodeURIComponent(post.id) + '/reply', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ user: storeUser, text: textValue })
      });
      const data = await res.json().catch(()=>({}));
      if(res.ok && data.reply){
        post.comments = post.comments || [];
        post.comments.push({ id: data.reply.id, user: storeUser, text: textValue, ts: data.reply.ts });
        replyList.appendChild(createReplyElement({ user: storeUser, text: textValue }));
        input.value = '';
      }
    });

    li.appendChild(actions);
    li.appendChild(replyList);
    li.appendChild(form);
    return li;
  }

  function renderReplyCard(reply){
    const li = document.createElement('li');
    li.className = 'post';
    li.innerHTML = `<div class="post-meta">Reply • ${formatTime(reply.ts)}</div><div>${reply.text || ''}</div><div class="post-meta">On @${reply.post_user || 'unknown'} post #${reply.message_id || ''}</div>`;
    return li;
  }

  function renderFeed(){
    feedEl.innerHTML = '';
    const items = filteredFeed();
    if(!items.length){
      const li = document.createElement('li');
      li.className = 'post';
      li.textContent = 'No ' + activeTab + ' yet.';
      feedEl.appendChild(li);
      return;
    }
    if(activeTab === 'replies'){
      items.forEach((reply) => feedEl.appendChild(renderReplyCard(reply)));
      return;
    }
    items.forEach((post) => feedEl.appendChild(renderPostCard(post)));
  }

  function renderRelationList(el, users, emptyText){
    el.innerHTML = '';
    if(!users.length){
      const li = document.createElement('li');
      li.className = 'relation-item';
      li.textContent = emptyText;
      el.appendChild(li);
      return;
    }
    users.forEach((name) => {
      const li = document.createElement('li');
      li.className = 'relation-item';
      const a = document.createElement('a');
      a.href = '/profile.html?user=' + encodeURIComponent(name);
      a.textContent = '@' + name;
      a.style.color = 'inherit';
      li.appendChild(a);
      el.appendChild(li);
    });
  }

  function renderStats(data){
    const stats = data?.stats || {};
    const cards = [
      ['Posts', stats.posts ?? data?.posts?.length ?? 0],
      ['Replies', stats.replies ?? data?.replies?.length ?? 0],
      ['Followers', stats.followers ?? data?.followers?.length ?? 0],
      ['Following', stats.following ?? data?.following?.length ?? 0],
      ['Likes Received', stats.likesReceived ?? 0],
      ['Messages', stats.directMessages ?? 0],
      ['Dating Likes', stats.datingLikesSent ?? data?.dating?.likedUsers?.length ?? 0],
      ['Dating Matches', stats.datingMatches ?? data?.dating?.matchedUsers?.length ?? 0]
    ];
    statsGrid.innerHTML = '';
    cards.forEach(([label, value]) => {
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML = '<div class="stat-label">' + label + '</div><div class="stat-value">' + value + '</div>';
      statsGrid.appendChild(card);
    });
  }

  function normalizeProfileData(raw){
    const data = raw || {};
    return {
      username: data.username || currentUser,
      profilePic: data.profilePic || '',
      description: data.description || '',
      posts: Array.isArray(data.posts) ? data.posts : [],
      replies: Array.isArray(data.replies) ? data.replies : [],
      followers: Array.isArray(data.followers) ? data.followers : [],
      following: Array.isArray(data.following) ? data.following : [],
      dating: {
        likedUsers: Array.isArray(data?.dating?.likedUsers) ? data.dating.likedUsers : [],
        matchedUsers: Array.isArray(data?.dating?.matchedUsers) ? data.dating.matchedUsers : []
      },
      followerCount: Number.isFinite(data.followerCount) ? data.followerCount : undefined,
      followingCount: Number.isFinite(data.followingCount) ? data.followingCount : undefined,
      stats: data.stats || {},
      isFollowing: !!data.isFollowing
    };
  }

  function resetProfileUI(){
    followBtn.style.display = '';
    followBtn.disabled = false;
    messageBtn.hidden = false;
    messageBtn.disabled = false;
    editSection.hidden = true;
    settingsSection.hidden = true;
  }

  pushToggle.addEventListener('change', async () => {
    if (pushToggle.checked) {
      try {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { pushToggle.checked = false; return; }
        const reg = await navigator.serviceWorker.register('/sw.js');
        const res = await fetch('/push/key');
        const data = await res.json().catch(()=>({}));
        if (!data.key) { pushToggle.checked = false; return; }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(data.key)
        });
        await fetch('/push/subscribe', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ username: storeUser, subscription: sub })
        });
        await fetch('/notification-settings/' + encodeURIComponent(storeUser), {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ push: true })
        });
      } catch {
        pushToggle.checked = false;
      }
    } else {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg) {
        const sub = await reg.pushManager.getSubscription();
        if (sub) await sub.unsubscribe();
      }
      await fetch('/push/unsubscribe', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: storeUser })
      });
      await fetch('/notification-settings/' + encodeURIComponent(storeUser), {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ push: false })
      });
    }
  });

  liveToggle.addEventListener('change', async () => {
    await fetch('/notification-settings/' + encodeURIComponent(storeUser), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ live: liveToggle.checked })
    });
  });

  async function load(target = currentUser){
    currentUser = (target || '').trim();
    if(!currentUser){
      nameEl.textContent = '@unknown';
      descEl.textContent = 'Select a user profile to view full details.';
      entryValidationEl.hidden = true;
      feedEl.innerHTML = '';
      return;
    }
    resetProfileUI();
    const res = await fetch('/profile/' + encodeURIComponent(currentUser) + '?viewer=' + encodeURIComponent(storeUser));
    if(!res.ok){
      const err = await res.json().catch(() => ({}));
      nameEl.textContent = '@' + currentUser;
      descEl.textContent = err.error || 'Profile could not be loaded.';
      renderEntryValidation(currentUser);
      profileData = normalizeProfileData({ username: currentUser });
      renderStats(profileData);
      renderRelationList(followersList, [], 'No followers yet.');
      renderRelationList(followingList, [], 'Not following anyone yet.');
      renderRelationList(datingLikedList, [], 'No dating likes yet.');
      renderRelationList(datingMatchedList, [], 'No matches yet.');
      followInfo.textContent = 'Followers: 0 • Following: 0';
      renderFeed();
      return;
    }
    const data = normalizeProfileData(await res.json());
    profileData = data;
    nameEl.textContent = '@' + data.username;
    const verifiedRecord = verifiedUsers()[data.username];
    verifiedEl.hidden = !verifiedRecord;
    if(verifiedRecord){
      decorateVerifiedBadge(verifiedEl, data.username);
    }
    renderEntryValidation(data.username);
    if(data.profilePic){ avatar.src = data.profilePic; avatar.style.display='block'; } else { avatar.style.display='none'; }
    descEl.textContent = data.description || '';
    const followerCount = Number.isFinite(data.followerCount) ? data.followerCount : (data.followers?.length || 0);
    const followingCount = Number.isFinite(data.followingCount) ? data.followingCount : (data.following?.length || 0);
    followInfo.textContent = 'Followers: ' + followerCount + ' • Following: ' + followingCount;
    renderStats(data);
    renderRelationList(followersList, Array.isArray(data.followers) ? data.followers : [], 'No followers yet.');
    renderRelationList(followingList, Array.isArray(data.following) ? data.following : [], 'Not following anyone yet.');
    renderRelationList(datingLikedList, data.dating?.likedUsers || [], 'No dating likes yet.');
    renderRelationList(datingMatchedList, data.dating?.matchedUsers || [], 'No matches yet.');

    if(storeUser && storeUser !== currentUser){
      followBtn.style.display = '';
      followBtn.textContent = data.isFollowing ? 'Unfollow' : 'Follow';
      messageBtn.textContent = 'Message';
      followBtn.onclick = async () => {
        const res = await fetch('/profile/' + encodeURIComponent(currentUser) + '/follow', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ follower: storeUser })
        });
        if(!res.ok){
          const err = await res.json().catch(() => ({}));
          alert(err.error || 'Unable to update follow status.');
          return;
        }
        load();
      };
      messageBtn.hidden = false;
      messageBtn.onclick = () => {
        window.location.href = '/private-chat.html?user=' + encodeURIComponent(currentUser);
      };
    } else if(!storeUser && currentUser){
      followBtn.style.display = '';
      followBtn.textContent = 'Log in to Follow';
      followBtn.onclick = () => alert('Please log in to follow users.');
      messageBtn.hidden = false;
      messageBtn.textContent = 'Log in to Chat';
      messageBtn.onclick = () => alert('Please log in to send encrypted private messages.');
    } else {
      followBtn.style.display = '';
      followBtn.textContent = 'This is your profile';
      followBtn.disabled = true;
      messageBtn.hidden = false;
      messageBtn.textContent = 'Cannot message yourself';
      messageBtn.disabled = true;
      editSection.hidden = false;
      descInput.value = data.description || '';
      saveDesc.onclick = async () => {
        const form = new FormData();
        form.append('description', descInput.value);
        if (picInput.files[0]) form.append('profile', picInput.files[0]);
        await fetch('/profile/' + encodeURIComponent(storeUser), {
          method:'POST',
          body: form
        });
        if (picInput.files[0]) {
          const reader = new FileReader();
          reader.onload = (e) => {
            localStorage.setItem('chaines_profile_pic', e.target.result);
            avatar.src = e.target.result;
            load();
            loadNotifs();
          };
          reader.readAsDataURL(picInput.files[0]);
        } else {
          load();
          loadNotifs();
        }
      };
      settingsSection.hidden = false;
      loadSettings();
      loadNotifs();
    }
    renderFeed();
  }

  async function loadNotifs(){
    const res = await fetch('/notifications/' + encodeURIComponent(storeUser));
    if(!res.ok) return;
    const data = await res.json();
    notifsEl.innerHTML = '';
    data.forEach(n => {
      const li = document.createElement('li');
      li.className = 'post';
      if(n.type === 'like'){
        li.textContent = (n.data.from || 'Someone') + ' liked your post #' + n.data.messageId;
      } else if(n.type === 'follow'){
        li.textContent = (n.data.from || 'Someone') + ' started following you';
      } else if(n.type === 'broadcast'){
        li.textContent = (n.data.from || 'Someone') + ' requested to ' + (n.data.mode === 'mic' ? 'join via mic' : 'join your broadcast');
      } else if(n.type === 'dm'){
        const sender = n.data.from || 'Someone';
        li.textContent = sender + ' sent you a private encrypted message';
        li.style.cursor = 'pointer';
        li.onclick = () => {
          window.location.href = '/private-chat.html?user=' + encodeURIComponent(sender);
        };
      } else if(n.type === 'dating-like'){
        li.textContent = (n.data.from || 'Someone') + ' liked your dating profile';
      } else if(n.type === 'dating-match'){
        li.textContent = '💘 You matched with ' + (n.data.with || 'someone');
      } else if(n.type === 'self-destruct'){
        li.textContent = 'Your post #' + n.data.messageId + ' self-destructed';
      }
      notifsEl.appendChild(li);
    });
  }

  async function loadSettings(){
    const res = await fetch('/notification-settings/' + encodeURIComponent(storeUser));
    if(!res.ok) return;
    const data = await res.json().catch(()=>({}));
    pushToggle.checked = !!data.push;
    liveToggle.checked = !!data.live;
  }

  function urlBase64ToUint8Array(base64String){
    const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
      outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
  }

  load(currentUser);
})();
</script>
</body>
</html>
