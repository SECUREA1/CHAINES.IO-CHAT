services:
  # Static site for the HTML
  - type: web
    name: chaines-chat-site
    runtime: static
    repo: https://github.com/SECUREA1/CHAINES.IO-CHAT.git
    branch: main
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /secure
        destination: /secure.html
      - type: rewrite
        source: /marketplace
        destination: /marketplace.html
      - type: rewrite
        source: /private-chat
        destination: /private-chat.html
      - type: rewrite
        source: /profile
        destination: /profile.html
    previews:
      generation: automatic

  # Node API/WebSocket service and durable SQLite data
  - type: web
    name: chaines-chat-ws
    runtime: node
    repo: https://github.com/SECUREA1/CHAINES.IO-CHAT.git
    rootDir: ws-server
    plan: starter
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: DB_PATH
        value: /var/data/chaines.db
    disk:
      name: chaines-data
      mountPath: /var/data
      sizeGB: 5
