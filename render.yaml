services:
  # Static site for the HTML
  - type: web
    name: chaines-chat-site
    runtime: static
    repo: https://github.com/SECUREA1/CHAINES.IO-CHAT.git
    branch: main
    buildCommand: ""
    staticPublishPath: .
    previews:
      generation: automatic

  # Node WebSocket fanout
  - type: web
    name: chaines-chat-ws
    runtime: node
    repo: https://github.com/SECUREA1/CHAINES.IO-CHAT.git
    rootDir: ws-server
    plan: starter
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /healthz
    disk:
      name: chaines-chat-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /var/data/app.db
      - key: PROFILE_MEMORY_PATH
        value: /var/data/profile_memory/main.json
