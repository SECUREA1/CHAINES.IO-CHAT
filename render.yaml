services:
  - type: web
    name: chaines-chat
    runtime: node
    repo: https://github.com/SECUREA1/CHAINES.IO-CHAT.git
    rootDir: ws-server
    plan: starter
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/chaines.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: PROFILE_MEMORY_PATH
        value: /var/data/profile_memory/main.json
    disks:
      - name: chaines-data
        mountPath: /var/data
        sizeGB: 1
