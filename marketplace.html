<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHAINeS Marketplace</title>
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
  <style>
    :root { --bg:#0b1024; --panel:#111a36; --fg:#f7f9ff; --muted:#9fb3d4; --line:#334155; --accent:#153a7a; --gold:#e5b35c; }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Arial; color:var(--fg); background: radial-gradient(1200px 800px at 10% -20%, #1d2f65, transparent 55%), var(--bg); }
    .wrap { max-width:1200px; margin:0 auto; padding:18px; display:grid; gap:12px; }
    .panel { background:color-mix(in oklab, var(--panel), transparent 15%); border:1px solid var(--line); border-radius:14px; box-shadow:0 0 20px rgba(16,42,92,.35); }
    header { padding:14px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .title { margin:0; font-size:20px; }
    .tools { padding:12px; display:grid; grid-template-columns:2fr repeat(3, minmax(130px,1fr)); gap:8px; }
    .tools input, .tools select, .tools button { width:100%; border-radius:10px; border:1px solid var(--line); padding:9px 10px; background:#0d1733; color:var(--fg); }
    .tools button { cursor:pointer; background:linear-gradient(180deg, #204388, var(--accent)); font-weight:700; }
    .meta { padding:0 12px 12px; color:var(--muted); display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; }
    .post-wrap { padding:12px; border-top:1px solid var(--line); display:grid; gap:10px; }
    .post-brand { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; align-items:center; }
    .post-title { margin:0; font-size:16px; }
    .post-sub { margin:0; color:var(--muted); font-size:12px; }
    .post-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:8px; }
    .post-grid input, .post-grid select, .post-grid textarea, .post-grid button {
      width:100%; border-radius:10px; border:1px solid var(--line); padding:9px 10px; background:#0d1733; color:var(--fg); font:inherit;
    }
    .post-grid textarea { min-height:90px; resize:vertical; grid-column:1/-1; }
    .post-grid .wide { grid-column:1/-1; }
    .post-grid button { cursor:pointer; background:linear-gradient(180deg, #2c5fbf, #153a7a); font-weight:700; }
    .post-status { min-height:1.2em; color:var(--muted); font-size:12px; }
    .post-status.error { color:#ff8e8e; }
    .post-status.success { color:#92f5b8; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:10px; padding:12px; }
    .card { border:1px solid var(--line); border-radius:12px; padding:10px; background:color-mix(in oklab, var(--panel), transparent 7%); display:grid; gap:8px; }
    .chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chip { font-size:11px; border:1px solid var(--line); border-radius:999px; padding:2px 8px; color:var(--gold); }
    .user { color:#9ad6ff; font-weight:700; }
    .small { color:var(--muted); font-size:12px; }
    .empty { text-align:center; color:var(--muted); padding:24px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="panel">
      <h1 class="title">CHAINeS Marketplace Explorer</h1>
      <a href="/index.html" style="color:var(--gold)">← Back to feed</a>
    </header>

    <section class="panel">
      <div class="tools">
        <input id="search" type="search" placeholder="Search users, listing details, text, location, category..." />
        <select id="category">
          <option value="all">All Categories</option>
          <option value="jobs">Jobs</option>
          <option value="for-sale">Items for sale</option>
          <option value="services">Services</option>
          <option value="housing">Housing</option>
          <option value="community">Community</option>
          <option value="general">General</option>
        </select>
        <select id="sort">
          <option value="value">Top value first</option>
          <option value="new">Newest first</option>
          <option value="old">Oldest first</option>
        </select>
        <button id="refresh" type="button">Refresh Search Engine</button>
      </div>
      <div class="meta">
        <span id="count">0 listings</span>
        <span>Marketplace posts only. Filter by category, query, and value sort.</span>
      </div>
      <div class="post-wrap">
        <div class="post-brand">
          <div>
            <h2 class="post-title">Post to Marketplace</h2>
            <p class="post-sub">Fast branded listing composer for jobs, services, and local offers.</p>
          </div>
        </div>
        <form id="post-form" class="post-grid">
          <input id="post-user" type="text" maxlength="24" placeholder="Your username" />
          <select id="post-category" required>
            <option value="jobs">Jobs</option>
            <option value="for-sale">Items for sale</option>
            <option value="services">Services</option>
            <option value="housing">Housing</option>
            <option value="community">Community</option>
            <option value="general">General</option>
          </select>
          <input id="post-price" type="text" maxlength="60" placeholder="Price or salary (optional)" />
          <input id="post-location" type="text" maxlength="80" placeholder="Location (optional)" />
          <input id="post-details" class="wide" type="text" maxlength="120" placeholder="Condition / details (optional)" />
          <textarea id="post-text" maxlength="800" required placeholder="Write your listing and call to action..."></textarea>
          <button type="submit">Publish Listing</button>
        </form>
        <div id="post-status" class="post-status" aria-live="polite"></div>
      </div>
      <div id="listings" class="grid"></div>
      <div id="empty" class="empty" hidden>No posts match your filters yet.</div>
    </section>
  </div>

  <script>
    (() => {
      const $ = (q) => document.querySelector(q);
      const sourceKey = 'chaines_messages';
      const controls = {
        search: $('#search'),
        category: $('#category'),
        sort: $('#sort'),
        refresh: $('#refresh')
      };
      const list = $('#listings');
      const count = $('#count');
      const empty = $('#empty');
      const postForm = $('#post-form');
      const postStatus = $('#post-status');
      const postUser = $('#post-user');
      const postCategory = $('#post-category');
      const postPrice = $('#post-price');
      const postLocation = $('#post-location');
      const postDetails = $('#post-details');
      const postText = $('#post-text');

      const MARKETPLACE_CATEGORIES = {
        jobs: { label: 'Jobs' },
        'for-sale': { label: 'Items for sale' },
        services: { label: 'Services' },
        housing: { label: 'Housing' },
        community: { label: 'Community' }
      };

      const normalizeListing = (listing = {}) => ({
        category: String(listing.category || 'general').trim() || 'general',
        price: String(listing.price || '').trim(),
        location: String(listing.location || '').trim(),
        condition: String(listing.condition || '').trim()
      });
      const isMarket = (m) => {
        const l = normalizeListing(m.listing || { category: m.category });
        return Object.hasOwn(MARKETPLACE_CATEGORIES, l.category) || !!(l.price || l.location || l.condition);
      };
      const valueScore = (m) => {
        const l = normalizeListing(m.listing || { category: m.category });
        const completedFields = [l.price, l.location, l.condition].filter(Boolean).length;
        const likes = Number(m.likes || 0);
        const comments = Array.isArray(m.comments) ? m.comments.length : 0;
        return (likes * 3) + (comments * 2) + completedFields + 2;
      };
      const load = () => {
        try { return JSON.parse(localStorage.getItem(sourceKey) || '[]'); }
        catch { return []; }
      };
      const save = (items) => localStorage.setItem(sourceKey, JSON.stringify(items));
      const sanitizeUser = (name) => String(name || '').replace(/[^a-zA-Z0-9_.-]/g, '').slice(0, 24);
      const setPostStatus = (text, tone = '') => {
        postStatus.textContent = text;
        postStatus.className = `post-status${tone ? ` ${tone}` : ''}`;
      };
      const formatTime = (ts) => {
        try { return new Date(ts).toLocaleString(); } catch { return ''; }
      };
      const include = (m) => {
        const category = controls.category.value;
        const q = controls.search.value.trim().toLowerCase();
        const l = normalizeListing(m.listing || { category: m.category });
        if (!isMarket(m)) return false;
        if (category !== 'all' && l.category !== category) return false;
        if (q) {
          const hay = [m.user, m.text, l.category, l.price, l.location, l.condition].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      };

      function render() {
        const items = load().filter(include);
        const sortBy = controls.sort.value;
        items.sort((a, b) => {
          if (sortBy === 'new') return Number(b.ts || 0) - Number(a.ts || 0);
          if (sortBy === 'old') return Number(a.ts || 0) - Number(b.ts || 0);
          return valueScore(b) - valueScore(a);
        });
        list.innerHTML = '';
        items.forEach((m) => {
          const l = normalizeListing(m.listing || { category: m.category });
          const card = document.createElement('article');
          card.className = 'card';
          card.innerHTML = `
            <div><span class="user">@${m.user || 'anon'}</span> <span class="small">• ${formatTime(m.ts)}</span></div>
            <div>${(m.text || '').replace(/</g,'&lt;')}</div>
            <div class="chips">
              <span class="chip">Market</span>
              <span class="chip">${(MARKETPLACE_CATEGORIES[l.category] || { label: 'General' }).label}</span>
              <span class="chip">Value ${valueScore(m)}</span>
            </div>
            <div class="small">Price/Salary: ${l.price || '—'}</div>
            <div class="small">Location: ${l.location || '—'}</div>
            <div class="small">Details: ${l.condition || '—'}</div>
            <div class="small">Likes ${m.likes || 0} • Comments ${(m.comments || []).length}</div>
          `;
          list.appendChild(card);
        });
        count.textContent = `${items.length} listings`;
        empty.hidden = items.length > 0;
      }

      function postListing(ev) {
        ev.preventDefault();
        const text = String(postText.value || '').trim();
        const user = sanitizeUser(postUser.value || localStorage.getItem('chaines_username') || 'anon');
        if (!text) {
          setPostStatus('Add listing text before publishing.', 'error');
          postText.focus();
          return;
        }
        const listing = normalizeListing({
          category: postCategory.value,
          price: postPrice.value,
          location: postLocation.value,
          condition: postDetails.value
        });
        const now = Date.now();
        const items = load();
        items.push({
          id: `${now}-${Math.random().toString(36).slice(2, 8)}`,
          user: user || 'anon',
          text,
          ts: now,
          likes: 0,
          comments: [],
          category: listing.category,
          listing
        });
        save(items);
        try { localStorage.setItem('chaines_username', user); } catch {}
        postForm.reset();
        postUser.value = user;
        postCategory.value = listing.category;
        setPostStatus('Listing published to CHAINeS Marketplace.', 'success');
        render();
      }

      Object.values(controls).forEach((el) => {
        if (!el || el.tagName === 'BUTTON') return;
        el.addEventListener('input', render);
        el.addEventListener('change', render);
      });
      controls.refresh.addEventListener('click', render);
      window.addEventListener('storage', (ev) => { if (ev.key === sourceKey) render(); });
      postUser.value = sanitizeUser(localStorage.getItem('chaines_username') || '');
      postForm.addEventListener('submit', postListing);
      render();
    })();
  </script>
</body>
</html>
